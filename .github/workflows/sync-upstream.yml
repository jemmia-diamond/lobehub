name: Sync Develop with Upstream Canary

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch: {}

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: develop
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Dry-Run and Sync
        id: sync_step
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

          git remote add upstream https://github.com/lobehub/lobe-chat.git
          git fetch upstream canary

          if [ "$(git rev-parse HEAD)" == "$(git rev-parse upstream/canary)" ]; then
            echo "Already in sync. Exiting."
            exit 0
          fi

          MERGE_REPORT=$(git merge-tree HEAD upstream/canary)

          if echo "$MERGE_REPORT" | grep -q "<<<<<<<"; then
            echo "::error::Dry-run failed! Merge conflicts detected."
            exit 1
          fi

          git merge upstream/canary --no-edit
          git push origin develop

