name: Build and Push to GHCR

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - '**.mdx'
      - '**.test.ts'
      - '**.test.tsx'
      - '**/__snapshots__/**'
      - '**/__tests__/**'
      - 'docs/**'
      - 'e2e/**'
      - '.vscode/**'
      - '.github/**'
  workflow_dispatch: {}

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Normalize Image Name
        run: echo "IMAGE_NAME=${IMAGE_NAME,,}" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,prefix=sha-,format=long

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
          build-args: |
            SHA=${{ github.sha }}

      - name: Deploy to Dokploy (Webhook Trigger)
        if: github.ref == 'refs/heads/main' && success()
        env:
          DOKPLOY_WEBHOOK_URL: ${{ secrets.DOKPLOY_WEBHOOK_URL }}
        run: |
          COMMIT_MESSAGE=$(git log -1 --pretty=%B)
          
          PAYLOAD=$(jq -n \
            --arg ref "${{ github.ref }}" \
            --arg id "${{ github.sha }}" \
            --arg message "$COMMIT_MESSAGE" \
            --arg digest "${{ steps.build.outputs.digest }}" \
            --arg tag "sha-${{ github.sha }}" \
            '{ref: $ref, head_commit: {id: $id, message: $message, digest: $digest, tag: $tag}}')

          curl -X POST "$DOKPLOY_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -H "X-GitHub-Event: push" \
            -d "$PAYLOAD"