name: Build and Push to GHCR

on:
  push:
    branches:
      - canary
    paths-ignore:
      - '**.md'
      - '**.mdx'
      - 'docs/**'
      - 'e2e/**'
      - '**.test.ts'
      - '**.test.tsx'
      - '.vscode/**'
      - '.github/workflows/test.yml'
  workflow_dispatch: {}

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/canary' }}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
          build-args: |
            SHA=${{ github.sha }}

      - name: Verify image pullable
        if: github.ref == 'refs/heads/canary' && success()
        run: |
          echo "Waiting for image to be available on GHCR..."
          echo "Image Digest: ${{ steps.build.outputs.digest }}"
          
          for i in {1..5}; do
            docker manifest inspect ghcr.io/${{ github.repository }}@${{ steps.build.outputs.digest }} > /dev/null 2>&1 && echo "✅ Image is live!" && break || \
            (echo "⏳ Manifest not ready yet, retrying... ($i/5)" && sleep 3)
          done

      - name: Deploy to Dokploy (Optional)
        if: github.ref == 'refs/heads/canary' && success()
        env:
          DOKPLOY_WEBHOOK_URL: ${{ secrets.DOKPLOY_WEBHOOK_URL }}
        run: |
          echo "Triggering Dokploy deployment with force pull..."
          COMMIT_MESSAGE=$(git log -1 --pretty=%B)

          PAYLOAD=$(jq -n \
            --arg ref "refs/heads/canary" \
            --arg id "${{ github.sha }}" \
            --arg message "$COMMIT_MESSAGE" \
            --arg digest "${{ steps.build.outputs.digest }}" \
            '{ref: $ref, head_commit: {id: $id, message: $message, digest: $digest}}')

          curl -X POST "${{ secrets.DOKPLOY_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -H "X-GitHub-Event: push" \
            -d "$PAYLOAD" || echo "Webhook failed, but continuing..."
