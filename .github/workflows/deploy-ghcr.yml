name: Build and Push to GHCR

on:
  push:
    branches:
      - canary
    paths-ignore:
      - '**.md'
      - '**.mdx'
      - 'docs/**'
      - 'e2e/**'
      - '.vscode/**'
  workflow_dispatch: {}

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_FOR_SYNC || secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Calculate Version
        id: version
        run: |
          git fetch --tags
          LATEST_TAG=$(git tag -l "v1.*" --sort=-v:refname | head -n 1)
          
          if [ -z "$LATEST_TAG" ]; then
            NEW_VERSION="1.0.0"
          else
            VERSION_PART=${LATEST_TAG#v}
            IFS='.' read -r major minor patch <<< "$VERSION_PART"
            NEW_PATCH=$((patch + 1))
            NEW_VERSION="$major.$minor.$NEW_PATCH"
          fi
          
          echo "NEW_VERSION=$NEW_VERSION" >> $GITHUB_ENV
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "🚀 Calculated Version: $NEW_VERSION"

      - name: Tag Version
        id: tagging
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git tag "v${{ steps.version.outputs.version }}"
          git push origin "v${{ steps.version.outputs.version }}"
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_FOR_SYNC || github.token }}

      - name: Replace Version Placeholder
        run: |
          sed -i "s/APP_VERSION_PLACEHOLDER/${{ steps.version.outputs.version }}/g" src/routes/\(main\)/home/_layout/Footer/index.tsx

      - name: Normalize Image Name
        run: echo "IMAGE_NAME=${IMAGE_NAME,,}" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=canary,enable=${{ github.ref == 'refs/heads/canary' }}
            type=sha,prefix=sha-,format=long

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
          build-args: |
            SHA=${{ github.sha }}

      - name: Deploy to Dokploy (Webhook Trigger)
        if: github.ref == 'refs/heads/canary' && success()
        env:
          DOKPLOY_WEBHOOK_URL: ${{ secrets.DOKPLOY_WEBHOOK_URL }}
        run: |
          COMMIT_MESSAGE=$(git log -1 --pretty=%B)
          
          PAYLOAD=$(jq -n \
            --arg ref "${{ github.ref }}" \
            --arg id "${{ github.sha }}" \
            --arg message "$COMMIT_MESSAGE" \
            --arg digest "${{ steps.build.outputs.digest }}" \
            --arg tag "sha-${{ github.sha }}" \
            '{ref: $ref, head_commit: {id: $id, message: $message, digest: $digest, tag: $tag}}')

          curl --fail -X POST "$DOKPLOY_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -H "X-GitHub-Event: push" \
            -d "$PAYLOAD"

      - name: Rollback Tag on Failure
        if: failure() && steps.tagging.outcome == 'success'
        run: |
          git push --delete origin "v${{ steps.version.outputs.version }}" || true
          git tag -d "v${{ steps.version.outputs.version }}" || true
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_FOR_SYNC || github.token }}