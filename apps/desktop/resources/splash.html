<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JemOS</title>
    <style>
      .drag-bar {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        height: 48px;
        -webkit-app-region: drag;
      }

      body {
        margin: 0;
        padding: 48px 0 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        color: #1d4ed8;
        background-color: #f8f8f8;
        overflow: hidden;
      }

      @media (prefers-color-scheme: dark) {
        body {
          background-color: #000;
        }
        .lobe-brand-loading {
          color: #f5f5f5;
        }
      }

      .container {
        text-align: center;
      }

      .lobe-brand-loading {
        font-size: 64px;
        font-weight: 800;
        letter-spacing: -0.05em;
        animation: fade 2s ease-in-out infinite;
      }

      @keyframes fade {
        0% { opacity: 0.2; }
        50% { opacity: 1; }
        100% { opacity: 0.2; }
      }
    </style>
  </head>
  <body>
    <div class="drag-bar"></div>
    <div class="container">
      <div class="lobe-brand-loading">JemOS</div>
    </div>
  </body>
</html>
